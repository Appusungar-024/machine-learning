<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FWI Prediction</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Animated Gradient Background */
    body {
      background: linear-gradient(-45deg, #6EE7B7, #3B82F6, #9333EA, #FDE68A);
      background-size: 400% 400%;
      animation: gradientMove 15s ease infinite;
    }
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen font-sans px-4">

  <div class="bg-white/20 backdrop-blur-xl border border-white/30 shadow-2xl rounded-3xl p-8 md:p-12 max-w-3xl w-full">
    <h1 class="text-center text-4xl font-bold text-white mb-8 drop-shadow-md">🔥 FWI Prediction 🔥</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post" class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <!-- Input fields -->
      <div class="flex flex-col">
        <label for="Temperature" class="text-white font-semibold mb-1">Temperature</label>
        <input type="text" id="Temperature" name="Temperature" placeholder="Temperature"
               required class="p-2 rounded-lg border border-blue-300 bg-white/70 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="flex flex-col">
        <label for="RH" class="text-white font-semibold mb-1">RH</label>
        <input type="text" id="RH" name="RH" placeholder="RH"
               required class="p-2 rounded-lg border border-blue-300 bg-white/70 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="flex flex-col">
        <label for="Ws" class="text-white font-semibold mb-1">Ws</label>
        <input type="text" id="Ws" name="Ws" placeholder="Ws"
               required class="p-2 rounded-lg border border-blue-300 bg-white/70 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="flex flex-col">
        <label for="Rain" class="text-white font-semibold mb-1">Rain</label>
        <input type="text" id="Rain" name="Rain" placeholder="Rain"
               required class="p-2 rounded-lg border border-blue-300 bg-white/70 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="flex flex-col">
        <label for="FFMC" class="text-white font-semibold mb-1">FFMC</label>
        <input type="text" id="FFMC" name="FFMC" placeholder="FFMC"
               required class="p-2 rounded-lg border border-blue-300 bg-white/70 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="flex flex-col">
        <label for="DMC" class="text-white font-semibold mb-1">DMC</label>
        <input type="text" id="DMC" name="DMC" placeholder="DMC"
               required class="p-2 rounded-lg border border-blue-300 bg-white/70 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="flex flex-col">
        <label for="ISI" class="text-white font-semibold mb-1">ISI</label>
        <input type="text" id="ISI" name="ISI" placeholder="ISI"
               required class="p-2 rounded-lg border border-blue-300 bg-white/70 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="flex flex-col">
        <label for="Classes" class="text-white font-semibold mb-1">Classes</label>
        <input type="text" id="Classes" name="Classes" placeholder="Classes"
               required class="p-2 rounded-lg border border-blue-300 bg-white/70 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="flex flex-col">
        <label for="Region" class="text-white font-semibold mb-1">Region</label>
        <input type="text" id="Region" name="Region" placeholder="Region"
               required class="p-2 rounded-lg border border-blue-300 bg-white/70 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- Predict Button -->
      <div class="md:col-span-3">
        <button type="submit"
                class="w-full py-3 mt-4 text-lg font-semibold text-white bg-blue-600 rounded-xl shadow-lg hover:bg-blue-700 hover:shadow-2xl transition-all duration-300">
          Predict 🔍
        </button>
      </div>
    </form>

    <!-- Prediction Result -->
    <h2 class="text-center text-white text-xl font-semibold mt-8 bg-white/20 rounded-lg py-3 px-4 shadow-lg">
      The FWI prediction is: <span class="font-bold text-yellow-200">{{ result }}</span>
    </h2>

    <!-- Go to Home Page Button -->
    <div class="text-center mt-6">
      <a href="/" class="inline-block bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-6 rounded-xl shadow-md hover:shadow-lg transition-all duration-300">
        ⬅ Go to Home Page
      </a>
    </div>
  </div>

</body>
</html>
