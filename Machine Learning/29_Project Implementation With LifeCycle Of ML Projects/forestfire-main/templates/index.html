<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Animated gradient background */
    body {
      background: linear-gradient(-45deg, #6EE7B7, #3B82F6, #9333EA, #FDE68A);
      background-size: 400% 400%;
      animation: gradientMove 15s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen font-sans text-center px-4">

  <!-- Card Container -->
  <div class="bg-white/20 backdrop-blur-xl shadow-2xl rounded-3xl p-10 md:p-16 max-w-3xl w-full border border-white/30">
    <h1 class="text-white text-4xl md:text-5xl font-bold mb-6 tracking-wider drop-shadow-lg">
      👋 Welcome to the Home Page
    </h1>
    <p class="text-white/90 text-lg md:text-xl mb-8">
      Explore our Machine Learning models and predict student exam performance with ease.
    </p>

    <!-- Button -->
    <a href="/predictdata"
       class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl shadow-lg hover:shadow-2xl transition-all duration-300">
      Go to Predictor 🚀
    </a>
  </div>

</body>
</html>
