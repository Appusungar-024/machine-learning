<!DOCTYPE html>
<html>
<head>
    <title>Cardio Compass</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% {background-position:0% 50%;}
            50% {background-position:100% 50%;}
            100% {background-position:0% 50%;}
        }

        img {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 40px;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        .btn {
            padding: 18px 30px;
            font-size: 22px;
            color: #fff;
            background: linear-gradient(90deg, #2d6cdf 0%, #5fa8d3 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(45,108,223,0.3);
            transition: all 0.4s ease;
            text-decoration: none;
        }

        .btn:hover {
            background: linear-gradient(90deg, #5fa8d3 0%, #2d6cdf 100%);
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(45,108,223,0.4);
        }
    </style>
</head>
<body>
    <img src="{{ url_for('static', filename='images/logo.jpg') }}" 
     alt="Cardio Compass Logo" 
     class="logo" 
     style="width:220px; height:220px; border-radius:50%; object-fit:cover; margin-bottom:20px;">

    <h1>Cardio Compass</h1>
    <a href="{{ url_for('index') }}" class="btn">Let's Check Your Heart Health</a>
</body>
</html>
